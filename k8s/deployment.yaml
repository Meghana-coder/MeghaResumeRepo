apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resume-app
  template:
    metadata:
      labels:
        app: resume-app
    spec:
      containers:
      - name: resume-app
        image: meghana-resume-build:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000